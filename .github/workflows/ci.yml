name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  CLANG_FORMAT_VERSION: '17'
  # Opt into Node.js 24 for GitHub Actions (Node.js 20 deprecated)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # Job 1: Code Format Check
  # ============================================
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check C/C++/CUDA formatting
        uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: ${{ env.CLANG_FORMAT_VERSION }}
          check-path: 'src'
          fallback-style: 'Google'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python linting tools
        run: pip install ruff

      - name: Check Python code quality
        run: |
          echo "=== Running ruff linter ==="
          ruff check python/ --output-format=github || true

          echo "=== Checking Python formatting ==="
          ruff format --check python/ --diff || true

  # ============================================
  # Job 2: Entry Consistency Check
  # ============================================
  consistency-check:
    name: Entry Consistency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify documented example files exist
        run: |
          python3 << 'EOF'
          import sys
          from pathlib import Path

          print("=== Checking documented example files ===")

          required_files = [
              "examples/elementwise/relu_example.cu",
              "examples/gemm/gemm_benchmark.cu",
              "examples/python/basic_usage.py",
          ]

          missing = []
          for file_path in required_files:
              path = Path(file_path)
              if path.exists():
                  print(f"âś“ Found: {file_path}")
              else:
                  print(f"âś— Missing: {file_path}")
                  missing.append(file_path)

          if missing:
              print(f"\nâťŚ Error: Missing {len(missing)} documented example file(s)")
              sys.exit(1)

          print(f"\nâś“ All {len(required_files)} example files verified")
          EOF

      - name: Verify Python module naming is consistent
        run: |
          python3 << 'EOF'
          import sys
          from pathlib import Path

          print("=== Checking Python module naming consistency ===")

          checks = {
              'python/bindings/bindings.cpp': 'NB_MODULE(hpc_ai_opt, m)',
              'python/CMakeLists.txt': 'nanobind_add_module(hpc_ai_opt',
              'examples/python/basic_usage.py': 'import hpc_ai_opt',
              'docs/python/index.rst': 'hpc_ai_opt',
              'README.md': 'hpc_ai_opt',
              'README.zh-CN.md': 'hpc_ai_opt',
          }

          errors = []
          for file_path, expected in checks.items():
              path = Path(file_path)
              if not path.exists():
                  print(f"âš  File not found: {file_path}")
                  continue

              content = path.read_text(encoding='utf-8')
              if expected in content:
                  print(f"âś“ {file_path}: contains '{expected}'")
              else:
                  print(f"âś— {file_path}: missing '{expected}'")
                  errors.append(file_path)

          if errors:
              print(f"\nâťŚ Error: {len(errors)} file(s) have naming inconsistencies")
              sys.exit(1)

          print(f"\nâś“ All naming checks passed")
          EOF

      - name: Verify CI scope is documented
        run: |
          python3 << 'EOF'
          import sys
          from pathlib import Path

          print("=== Checking CI scope documentation ===")

          readme = Path('README.md')
          if not readme.exists():
              print("âťŚ Error: README.md not found")
              sys.exit(1)

          content = readme.read_text(encoding='utf-8')
          scope_text = "does **not** currently provide full native CUDA build-and-test"

          if scope_text in content:
              print(f"âś“ CI scope documentation found in README.md")
          else:
              print("âťŚ Error: CI scope documentation missing from README.md")
              print("Expected text: 'does **not** currently provide full native CUDA build-and-test'")
              sys.exit(1)

          print("\nâś“ CI scope documentation verified")
          EOF

      - name: Verify required configuration files exist
        run: |
          python3 << 'EOF'
          import sys
          from pathlib import Path

          print("=== Checking required configuration files ===")

          required_configs = [
              ".clang-format",
              ".clang-tidy",
              ".editorconfig",
              ".pre-commit-config.yaml",
              "CMakeLists.txt",
              "LICENSE",
              "CONTRIBUTING.md",
              "CODE_OF_CONDUCT.md",
              "CHANGELOG.md",
              "SECURITY.md",
          ]

          missing = []
          for config in required_configs:
              if Path(config).exists():
                  print(f"âś“ Found: {config}")
              else:
                  print(f"âś— Missing: {config}")
                  missing.append(config)

          if missing:
              print(f"\nâťŚ Error: Missing {len(missing)} configuration file(s)")
              sys.exit(1)

          print(f"\nâś“ All {len(required_configs)} configuration files verified")
          EOF

      - name: Verify version consistency
        run: |
          python3 << 'EOF'
          import re
          import sys
          from pathlib import Path

          print("=== Checking version consistency ===")

          # Check CMakeLists.txt version
          cmake = Path('CMakeLists.txt').read_text()
          cmake_match = re.search(r'VERSION\s+(\d+\.\d+\.\d+)', cmake)
          cmake_version = cmake_match.group(1) if cmake_match else None

          # Check Doxyfile version
          doxyfile = Path('docs/Doxyfile').read_text()
          doxy_match = re.search(r'PROJECT_NUMBER\s*=\s*(\d+\.\d+\.\d+)', doxyfile)
          doxy_version = doxy_match.group(1) if doxy_match else None

          print(f"CMakeLists.txt version: {cmake_version}")
          print(f"Doxyfile version: {doxy_version}")

          if cmake_version and doxy_version and cmake_version != doxy_version:
              print(f"âťŚ Error: Version mismatch!")
              sys.exit(1)

          print("âś“ Versions are consistent")
          EOF

  # ============================================
  # Job 3: Documentation Build
  # ============================================
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Sphinx and dependencies
        run: |
          pip install \
            sphinx \
            sphinx-rtd-theme \
            breathe \
            myst-parser \
            sphinx-copybutton

      - name: Build Doxygen documentation
        run: |
          echo "=== Building Doxygen (C++/CUDA API) ==="
          if [ -f docs/Doxyfile ]; then
            cd docs
            doxygen Doxyfile 2>&1 | tee doxygen.log
            if [ -d api/html ]; then
              echo "âś“ Doxygen HTML generated at docs/api/html/"
              echo "Generated $(find api/html -name '*.html' | wc -l) HTML files"
            else
              echo "âš  Warning: Doxygen output not found"
            fi
          else
            echo "âš  Warning: docs/Doxyfile not found, skipping Doxygen build"
          fi

      - name: Build Sphinx documentation
        run: |
          echo "=== Building Sphinx (Python API) ==="
          if [ -f docs/python/conf.py ]; then
            # Ensure templates directory exists
            mkdir -p docs/python/_templates

            cd docs/python
            sphinx-build -b html . _build/html 2>&1 | tee sphinx.log
            sphinx_exit=$?

            if [ $sphinx_exit -eq 0 ] && [ -d _build/html ]; then
              echo "âś“ Sphinx HTML generated at docs/python/_build/html/"
              echo "Generated $(find _build/html -name '*.html' | wc -l) HTML files"
            else
              echo "âš  Warning: Sphinx build completed with issues"
            fi
          else
            echo "âš  Warning: docs/python/conf.py not found, skipping Sphinx build"
          fi

      - name: Verify documentation output
        run: |
          echo "=== Verifying documentation build ==="

          # Check Doxygen output
          if [ -d docs/api/html ]; then
            echo "âś“ Doxygen documentation available"
          fi

          # Check Sphinx output
          if [ -d docs/python/_build/html ]; then
            echo "âś“ Sphinx documentation available"
          fi

          # At least one should exist
          if [ -d docs/api/html ] || [ -d docs/python/_build/html ]; then
            echo "âś“ Documentation build successful"
          else
            echo "âš  Warning: No documentation was generated (this may be expected for partial builds)"
          fi

  # ============================================
  # Job 4: CI Status Summary
  # ============================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [format-check, consistency-check, docs]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "=== CI Status Summary ==="
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Format Check | ${{ needs.format-check.result }} |"
          echo "| Consistency Check | ${{ needs.consistency-check.result }} |"
          echo "| Docs Build | ${{ needs.docs.result }} |"
          echo ""

          if [[ "${{ needs.format-check.result }}" != "success" || \
                "${{ needs.consistency-check.result }}" != "success" || \
                "${{ needs.docs.result }}" != "success" ]]; then
            echo "âťŚ One or more required jobs failed"
            exit 1
          fi

          echo "âś… All required jobs passed!"
