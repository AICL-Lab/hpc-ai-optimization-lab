name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check C/C++/CUDA formatting
        uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: '17'
          check-path: 'src'
          fallback-style: 'Google'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Check Python formatting
        run: |
          pip install ruff
          ruff check python/
          ruff format --check python/

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install doc dependencies
        run: |
          pip install sphinx sphinx-rtd-theme breathe myst-parser sphinx-copybutton

      - name: Build Doxygen docs
        run: |
          if [ -f docs/Doxyfile ]; then
            cd docs && doxygen Doxyfile
          else
            echo "Doxyfile not found, skipping Doxygen"
          fi

      - name: Build Sphinx docs
        run: |
          if [ -f docs/python/conf.py ]; then
            cd docs/python && sphinx-build -b html . _build/html
          else
            echo "Sphinx config not found, skipping"
          fi

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [format-check, docs]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.format-check.result }}" != "success" || "${{ needs.docs.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed!"
