<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="ogBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ogAccentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76B900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:1" />
    </linearGradient>
    <filter id="ogShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBgGrad)"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="150" r="200" fill="url(#ogAccentGrad)" opacity="0.05"/>
  <circle cx="1000" cy="500" r="250" fill="url(#ogAccentGrad)" opacity="0.03"/>
  
  <!-- GPU Icon -->
  <g transform="translate(200, 315)" filter="url(#ogShadow)">
    <rect x="-60" y="-50" width="120" height="100" rx="10" fill="#21262D" stroke="#30363D" stroke-width="2"/>
    <rect x="-40" y="-35" width="80" height="70" rx="6" fill="url(#ogAccentGrad)"/>
    <rect x="-20" y="-20" width="15" height="15" rx="3" fill="#ffffff" opacity="0.9"/>
    <rect x="5" y="-20" width="15" height="15" rx="3" fill="#ffffff" opacity="0.9"/>
    <rect x="-20" y="5" width="15" height="15" rx="3" fill="#ffffff" opacity="0.9"/>
    <rect x="5" y="5" width="15" height="15" rx="3" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Title -->
  <text x="360" y="260" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="800" fill="#F0F6FC" letter-spacing="-1.5">FastGPU Lab</text>
  
  <!-- Subtitle -->
  <text x="360" y="330" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="600" fill="url(#ogAccentGrad)">Master GPU Kernel Optimization</text>
  
  <!-- Description -->
  <text x="360" y="390" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="400" fill="#8B949E">From first principles to production-ready CUDA code</text>
  
  <!-- Stats bar -->
  <g transform="translate(360, 480)">
    <rect x="0" y="0" width="720" height="60" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1"/>
    
    <text x="120" y="38" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#76B900" text-anchor="middle">7</text>
    <text x="120" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="500" fill="#8B949E" text-anchor="middle">MODULES</text>
    
    <line x1="240" y1="15" x2="240" y2="45" stroke="#30363D" stroke-width="1"/>
    
    <text x="360" y="38" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#76B900" text-anchor="middle">140x</text>
    <text x="360" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="500" fill="#8B949E" text-anchor="middle">SPEEDUP</text>
    
    <line x1="480" y1="15" x2="480" y2="45" stroke="#30363D" stroke-width="1"/>
    
    <text x="600" y="38" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#76B900" text-anchor="middle">70+</text>
    <text x="600" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="500" fill="#8B949E" text-anchor="middle">TFLOPS</text>
  </g>
</svg>
