<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="perfBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ca8a04;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#84cc16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#65a30d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#76B900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a8f00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" fill="url(#perfBg)"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    GEMM Performance Optimization Journey
  </text>
  <text x="450" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">
    FP32 Matrix Multiplication (4096×4096) on NVIDIA A100
  </text>
  
  <!-- Chart Area -->
  <g transform="translate(120, 100)">
    <!-- Y-Axis -->
    <line x1="0" y1="0" x2="0" y2="380" stroke="#94a3b8" stroke-width="2"/>
    <text x="-50" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569" transform="rotate(-90, -50, 200)">
      Performance (TFLOPS)
    </text>
    
    <!-- Y-Axis Labels -->
    <text x="-10" y="380" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#64748b">0</text>
    <line x1="-5" y1="380" x2="0" y2="380" stroke="#94a3b8" stroke-width="1"/>
    
    <text x="-10" y="325" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#64748b">10</text>
    <line x1="-5" y1="325" x2="700" y2="325" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>
    
    <text x="-10" y="270" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#64748b">20</text>
    <line x1="-5" y1="270" x2="700" y2="270" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>
    
    <text x="-10" y="215" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#64748b">30</text>
    <line x1="-5" y1="215" x2="700" y2="215" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>
    
    <text x="-10" y="160" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#64748b">40</text>
    <line x1="-5" y1="160" x2="700" y2="160" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>
    
    <text x="-10" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#64748b">50</text>
    <line x1="-5" y1="105" x2="700" y2="105" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>
    
    <text x="-10" y="50" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#64748b">60</text>
    <line x1="-5" y1="50" x2="700" y2="50" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>
    
    <text x="-10" y="5" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#64748b">70</text>
    <line x1="-5" y1="5" x2="700" y2="5" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>
    
    <!-- X-Axis -->
    <line x1="0" y1="380" x2="700" y2="380" stroke="#94a3b8" stroke-width="2"/>
    
    <!-- Bars -->
    <!-- Step 1: 0.5 TFLOPS -->
    <g filter="url(#shadow)">
      <rect x="20" y="377" width="70" height="3" fill="url(#bar1)" rx="2"/>
    </g>
    <text x="55" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Step 1</text>
    <text x="55" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Naive</text>
    <text x="55" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ef4444">0.5</text>
    
    <!-- Step 2: 2.0 TFLOPS -->
    <g filter="url(#shadow)">
      <rect x="115" y="369" width="70" height="11" fill="url(#bar2)" rx="2"/>
    </g>
    <text x="150" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Step 2</text>
    <text x="150" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Shared Mem</text>
    <text x="150" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#f97316">2.0</text>
    
    <!-- Step 3: 3.5 TFLOPS -->
    <g filter="url(#shadow)">
      <rect x="210" y="361" width="70" height="19" fill="url(#bar3)" rx="2"/>
    </g>
    <text x="245" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Step 3</text>
    <text x="245" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Double Buf</text>
    <text x="245" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#eab308">3.5</text>
    
    <!-- Step 4: 6.0 TFLOPS -->
    <g filter="url(#shadow)">
      <rect x="305" y="348" width="70" height="32" fill="url(#bar4)" rx="2"/>
    </g>
    <text x="340" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Step 4</text>
    <text x="340" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Register Tile</text>
    <text x="340" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#84cc16">6.0</text>
    
    <!-- Step 5: 50+ TFLOPS -->
    <g filter="url(#shadow)">
      <rect x="400" y="105" width="70" height="275" fill="url(#bar5)" rx="2"/>
    </g>
    <text x="435" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Step 5</text>
    <text x="435" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Tensor Core</text>
    <text x="435" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#22c55e">50+</text>
    
    <!-- Step 6: ~60 TFLOPS -->
    <g filter="url(#shadow)">
      <rect x="495" y="50" width="70" height="330" fill="url(#bar6)" rx="2" opacity="0.6"/>
    </g>
    <text x="530" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Step 6</text>
    <text x="530" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">MMA PTX 🚧</text>
    <text x="530" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#06b6d4">~60†</text>
    
    <!-- Step 7: ~70 TFLOPS -->
    <g filter="url(#shadow)">
      <rect x="590" y="5" width="70" height="375" fill="url(#bar7)" rx="2" opacity="0.5"/>
    </g>
    <text x="625" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Step 7</text>
    <text x="625" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Pipeline 🚧</text>
    <text x="625" y="1" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#76B900">~70†</text>
  </g>
  
  <!-- Speedup Annotations -->
  <g transform="translate(120, 100)">
    <path d="M55 377 Q150 350 245 361" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
    <text x="150" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">7×</text>
    
    <path d="M245 361 Q340 330 435 105" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
    <text x="370" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">100×</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(720, 120)">
    <rect x="0" y="0" width="160" height="100" fill="white" stroke="#e2e8f0" stroke-width="1" rx="5"/>
    <text x="80" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Legend</text>
    
    <rect x="15" y="35" width="15" height="15" fill="#22c55e" rx="2"/>
    <text x="40" y="47" font-family="Arial, sans-serif" font-size="11" fill="#475569">✅ Implemented</text>
    
    <rect x="15" y="60" width="15" height="15" fill="#06b6d4" opacity="0.6" rx="2"/>
    <text x="40" y="72" font-family="Arial, sans-serif" font-size="11" fill="#475569">🚧 In Development</text>
    
    <text x="15" y="92" font-family="Arial, sans-serif" font-size="9" fill="#64748b">† Projected estimates</text>
  </g>
  
  <!-- Key Insight -->
  <g transform="translate(720, 240)">
    <rect x="0" y="0" width="160" height="90" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="5"/>
    <text x="80" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">💡 Key Insight</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="10" fill="#92400e">Step 5 achieves</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#92400e">100× speedup</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="10" fill="#92400e">with Tensor Cores!</text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="9" fill="#78716c">Dedicated hardware FTW</text>
  </g>
</svg>
