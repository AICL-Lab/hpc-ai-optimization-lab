<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76B900;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5FD85F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#161B22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1" />
    </linearGradient>
    <filter id="heroShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="48"/>
  
  <!-- Outer ring -->
  <circle cx="200" cy="180" r="130" fill="none" stroke="url(#heroGrad)" stroke-width="4" opacity="0.3"/>
  <circle cx="200" cy="180" r="120" fill="none" stroke="url(#heroGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- Main GPU icon -->
  <g transform="translate(200, 180)" filter="url(#heroShadow)">
    <!-- Chip body -->
    <rect x="-70" y="-55" width="140" height="110" rx="12" fill="#21262D" stroke="#30363D" stroke-width="2"/>
    
    <!-- Inner chip -->
    <rect x="-50" y="-40" width="100" height="80" rx="8" fill="url(#heroGrad)" filter="url(#glow)"/>
    
    <!-- Core grid -->
    <rect x="-25" y="-20" width="20" height="20" rx="4" fill="#ffffff" opacity="0.9"/>
    <rect x="5" y="-20" width="20" height="20" rx="4" fill="#ffffff" opacity="0.9"/>
    <rect x="-25" y="5" width="20" height="20" rx="4" fill="#ffffff" opacity="0.9"/>
    <rect x="5" y="5" width="20" height="20" rx="4" fill="#ffffff" opacity="0.9"/>
    
    <!-- Connection lines -->
    <rect x="-70" y="-25" width="20" height="6" rx="2" fill="#76B900"/>
    <rect x="-70" y="5" width="20" height="6" rx="2" fill="#76B900"/>
    <rect x="50" y="-25" width="20" height="6" rx="2" fill="#76B900"/>
    <rect x="50" y="5" width="20" height="6" rx="2" fill="#76B900"/>
    <rect x="-25" y="-55" width="12" height="20" rx="2" fill="#76B900"/>
    <rect x="13" y="-55" width="12" height="20" rx="2" fill="#76B900"/>
    <rect x="-25" y="40" width="12" height="20" rx="2" fill="#76B900"/>
    <rect x="13" y="40" width="12" height="20" rx="2" fill="#76B900"/>
  </g>
  
  <!-- Brand text -->
  <text x="200" y="340" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="700" fill="#76B900" text-anchor="middle" letter-spacing="-0.5">FastGPU Lab</text>
  <text x="200" y="370" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="500" fill="#8B949E" text-anchor="middle" letter-spacing="0.5">CUDA KERNEL OPTIMIZATION</text>
</svg>
