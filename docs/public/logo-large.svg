  </defs>
  <rect width="400" height="400" fill="#0f172a" rx="40"/>
  <circle cx="200" cy="180" r="100" fill="url(#grad1)" filter="url(#shadow)"/>
  <text x="200" y="210" font-family="Arial,sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">GPU</text>
  <text x="200" y="320" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="#22d3ee" text-anchor="middle">HPC-AI Lab</text>
</svg>
