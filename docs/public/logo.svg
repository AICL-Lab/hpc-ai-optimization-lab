<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76B900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A8F00;stop-opacity:1" />
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="44" fill="url(#logoGrad)" filter="url(#logoShadow)"/>
  <!-- GPU chip representation -->
  <rect x="30" y="35" width="40" height="30" rx="4" fill="#ffffff" opacity="0.95"/>
  <!-- Core -->
  <rect x="42" y="42" width="16" height="16" rx="2" fill="#76B900"/>
  <!-- Connection lines -->
  <rect x="34" y="42" width="6" height="3" rx="1" fill="#76B900"/>
  <rect x="34" y="50" width="6" height="3" rx="1" fill="#76B900"/>
  <rect x="60" y="42" width="6" height="3" rx="1" fill="#76B900"/>
  <rect x="60" y="50" width="6" height="3" rx="1" fill="#76B900"/>
  <rect x="45" y="37" width="10" height="3" rx="1" fill="#76B900"/>
  <rect x="45" y="60" width="10" height="3" rx="1" fill="#76B900"/>
</svg>
