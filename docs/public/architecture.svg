<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76B900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a8f00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="moduleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="utilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e293b">
    HPC-AI-Optimization-Lab Architecture
  </text>
  
  <!-- Core Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="80" width="800" height="100" rx="10" fill="url(#coreGrad)"/>
    <text x="450" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">
      CUDA Core Infrastructure
    </text>
    <text x="450" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">
      C++20 • CUDA 12.4+ • CMake 3.24+ • GoogleTest + RapidCheck
    </text>
  </g>
  
  <!-- Module Layer -->
  <g filter="url(#shadow)">
    <!-- Elementwise -->
    <rect x="50" y="210" width="170" height="90" rx="8" fill="url(#moduleGrad)"/>
    <text x="135" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Elementwise</text>
    <text x="135" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">ReLU • Sigmoid</text>
    <text x="135" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">Transpose • VectorAdd</text>
    
    <!-- Reduction -->
    <rect x="240" y="210" width="170" height="90" rx="8" fill="url(#moduleGrad)"/>
    <text x="325" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Reduction</text>
    <text x="325" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">Softmax • LayerNorm</text>
    <text x="325" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">RMSNorm</text>
    
    <!-- GEMM -->
    <rect x="430" y="210" width="170" height="90" rx="8" fill="url(#coreGrad)"/>
    <text x="515" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">GEMM ⭐</text>
    <text x="515" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">7-Step Optimization</text>
    <text x="515" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">0.5 → 70+ TFLOPS</text>
    
    <!-- Attention -->
    <rect x="620" y="210" width="170" height="90" rx="8" fill="url(#moduleGrad)"/>
    <text x="705" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Attention</text>
    <text x="705" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">FlashAttention • RoPE</text>
    <text x="705" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">TopK</text>
  </g>
  
  <!-- Second Row Modules -->
  <g filter="url(#shadow)">
    <!-- Convolution -->
    <rect x="120" y="320" width="170" height="90" rx="8" fill="url(#moduleGrad)"/>
    <text x="205" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Convolution</text>
    <text x="205" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">Implicit GEMM</text>
    <text x="205" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">Winograd</text>
    
    <!-- Quantization -->
    <rect x="310" y="320" width="170" height="90" rx="8" fill="url(#moduleGrad)"/>
    <text x="395" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Quantization</text>
    <text x="395" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">INT8 • FP8</text>
    <text x="395" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">Symmetric Quant</text>
    
    <!-- CUDA 13 -->
    <rect x="500" y="320" width="170" height="90" rx="8" fill="url(#moduleGrad)"/>
    <text x="585" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">CUDA 13</text>
    <text x="585" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">TMA • Clusters</text>
    <text x="585" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">Hopper Features</text>
  </g>
  
  <!-- Utilities Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="430" width="800" height="70" rx="10" fill="url(#utilGrad)"/>
    <text x="450" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
      Utilities &amp; Helpers
    </text>
    <text x="450" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">
      Tensor&lt;T&gt; • CudaTimer • CUDA_CHECK • cuBLAS • CUTLASS
    </text>
  </g>
  
  <!-- Python Bindings -->
  <g filter="url(#shadow)">
    <rect x="50" y="520" width="380" height="60" rx="10" fill="#FFD43B"/>
    <text x="240" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">
      Python Bindings (nanobind)
    </text>
    <text x="240" y="568" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(30,41,59,0.8)">
      hpc_ai_opt.elementwise • reduction • gemm
    </text>
  </g>
  
  <!-- Documentation -->
  <g filter="url(#shadow)">
    <rect x="470" y="520" width="380" height="60" rx="10" fill="#06B6D4"/>
    <text x="660" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
      Documentation (VitePress)
    </text>
    <text x="660" y="568" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">
      Bilingual (EN/ZH-CN) • API Reference • Guides
    </text>
  </g>
  
  <!-- Arrows -->
  <path d="M450 180 L450 210" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#475569"/>
    </marker>
  </defs>
</svg>
